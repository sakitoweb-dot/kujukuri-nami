
<style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+JP:wght@400;500;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0;}
:root{--deep:#03213F;--accent:#00d4ff;--gold:#FFD166;--green:#06D6A0;--red:#EF476F;--text:#e8f4fd;--muted:rgba(232,244,253,0.5);}

body{background:var(--deep);}

.app{
  background:var(--deep);
  min-height:100vh;
  font-family:'Noto Sans JP',sans-serif;
  color:var(--text);
  position:relative;
  overflow-x:hidden;
}

.ocean-bg{position:fixed;bottom:0;left:0;right:0;height:120px;overflow:hidden;z-index:0;pointer-events:none;}
.w1{position:absolute;bottom:0;width:200%;animation:wm 8s linear infinite;opacity:.07;}
.w2{position:absolute;bottom:8px;width:200%;animation:wm 13s linear infinite reverse;opacity:.05;}
@keyframes wm{from{transform:translateX(0);}to{transform:translateX(-50%);}}

/* ===== LAYOUT WRAPPER ===== */
.page{
  position:relative;z-index:1;
  max-width:1100px;
  margin:0 auto;
  padding:16px;
}

/* ===== HEADER ===== */
.header{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:14px;
  flex-wrap:wrap;gap:8px;
}
.brand{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:2px;color:var(--accent);text-shadow:0 0 20px rgba(0,212,255,.4);}
.upd{font-size:10px;color:var(--muted);background:rgba(255,255,255,.06);padding:4px 12px;border-radius:20px;border:.5px solid rgba(255,255,255,.12);}

/* ===== SPOT TABS ===== */
.spots-wrap{overflow-x:auto;scrollbar-width:none;margin-bottom:14px;}
.spots-wrap::-webkit-scrollbar{display:none;}
.spots{display:flex;gap:6px;width:max-content;}
.stab{padding:7px 14px;border-radius:30px;border:1px solid rgba(255,255,255,.15);background:transparent;color:var(--muted);font-size:11px;font-family:'Noto Sans JP',sans-serif;cursor:pointer;transition:all .25s;white-space:nowrap;}
.stab.active{background:var(--accent);color:var(--deep);border-color:var(--accent);font-weight:700;box-shadow:0 0 14px rgba(0,212,255,.35);}

/* ===== MAIN GRID (desktop: 2 col, mobile: 1 col) ===== */
.main-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:14px;
}
@media(max-width:640px){
  .main-grid{grid-template-columns:1fr;}
}

/* ===== HERO ===== */
.hero{
  background:rgba(255,255,255,.04);
  border:.5px solid rgba(0,212,255,.2);
  border-radius:20px;padding:18px;
  display:flex;align-items:center;gap:14px;
}
.ring{width:88px;height:88px;flex-shrink:0;position:relative;}
.ring svg{display:block;}
.rnum{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.rval{font-family:'Bebas Neue',sans-serif;font-size:30px;line-height:1;color:var(--accent);}
.rlbl{font-size:8px;color:var(--muted);}
.hinfo{flex:1;min-width:0;}
.hspot{font-size:14px;font-weight:700;margin-bottom:5px;}
.hcond{font-size:11px;font-weight:700;padding:3px 10px;border-radius:12px;display:inline-block;margin-bottom:7px;}
.cg{background:rgba(6,214,160,.2);color:var(--green);border:.5px solid var(--green);}
.cf{background:rgba(255,209,102,.2);color:var(--gold);border:.5px solid var(--gold);}
.cp{background:rgba(239,71,111,.2);color:var(--red);border:.5px solid var(--red);}
.hbt{font-size:11px;color:var(--muted);}
.hbt strong{color:var(--gold);}

/* ===== STATS GRID ===== */
.sgrid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;}
.sc{background:rgba(255,255,255,.05);border:.5px solid rgba(255,255,255,.1);border-radius:14px;padding:12px;text-align:center;}
.si{font-size:16px;margin-bottom:3px;}
.sl{font-size:10px;color:var(--muted);margin-bottom:1px;}
.sv{font-family:'Bebas Neue',sans-serif;font-size:26px;color:var(--text);line-height:1;}
.su{font-size:10px;color:var(--muted);}
.src-badge{font-size:9px;padding:1px 6px;border-radius:8px;display:inline-block;margin-top:2px;}
.src-real{background:rgba(6,214,160,.15);color:var(--green);}
.src-est{background:rgba(255,209,102,.15);color:var(--gold);}

/* ===== VIZ ===== */
.viz{
  background:rgba(255,255,255,.04);
  border:.5px solid rgba(255,255,255,.08);
  border-radius:16px;padding:14px;
}
.vtitle{font-size:10px;color:var(--muted);margin-bottom:8px;text-transform:uppercase;letter-spacing:.5px;}
.hbars{display:flex;align-items:flex-end;gap:2px;height:60px;}
.hbw{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;}
.hb{width:100%;border-radius:2px 2px 0 0;background:rgba(0,212,255,.3);transition:height .5s cubic-bezier(.34,1.56,.64,1);min-height:2px;}
.hb.now{background:var(--accent);box-shadow:0 0 6px rgba(0,212,255,.6);}
.hbl{font-size:8px;color:var(--muted);}
.bands{display:flex;margin-top:6px;gap:2px;height:5px;border-radius:3px;overflow:hidden;}
.band{flex:1;}
.bg2{background:var(--green);}.bf2{background:var(--gold);}.bp2{background:rgba(255,255,255,.1);}

/* ===== FORECAST ===== */
.fc-section{grid-column:1/-1;}
.fctitle{font-size:10px;color:var(--muted);margin-bottom:8px;text-transform:uppercase;letter-spacing:.5px;}
.fc-rows{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}
@media(max-width:640px){.fc-rows{grid-template-columns:1fr;}}
.fcrow{
  display:flex;align-items:center;padding:10px 12px;
  background:rgba(255,255,255,.04);border:.5px solid rgba(255,255,255,.07);
  border-radius:12px;gap:9px;
}
.fcd{font-size:12px;color:var(--muted);width:36px;}
.fcdot{width:9px;height:9px;border-radius:50%;flex-shrink:0;}
.dg{background:var(--green);}.df{background:var(--gold);}.dp{background:var(--red);}
.fch{font-size:13px;font-weight:700;flex:1;}
.fcp{font-size:11px;color:var(--muted);}
.fcs{font-size:10px;font-weight:700;padding:2px 7px;border-radius:10px;background:rgba(0,212,255,.15);color:var(--accent);}

/* ===== NOTE ===== */
.note{
  grid-column:1/-1;
  padding:10px 14px;
  background:rgba(255,209,102,.07);
  border:.5px solid rgba(255,209,102,.25);
  border-radius:12px;font-size:10px;color:rgba(255,209,102,.8);line-height:1.6;
}

/* ===== FAVS ===== */
.favs{grid-column:1/-1;}
.favtitle{font-size:10px;color:var(--muted);margin-bottom:7px;text-transform:uppercase;letter-spacing:.5px;}
.favchips{display:flex;gap:6px;flex-wrap:wrap;}
.fchip{padding:5px 12px;border-radius:20px;border:.5px solid rgba(255,255,255,.15);background:rgba(255,255,255,.05);font-size:11px;color:var(--muted);cursor:pointer;transition:all .2s;font-family:'Noto Sans JP',sans-serif;}
.fchip.on{background:rgba(255,209,102,.15);color:var(--gold);border-color:var(--gold);}

/* ===== REFRESH ===== */
.rbtn-wrap{grid-column:1/-1;}
.rbtn{
  width:100%;padding:13px;border-radius:14px;
  background:rgba(0,212,255,.12);border:.5px solid var(--accent);
  color:var(--accent);font-size:13px;font-family:'Noto Sans JP',sans-serif;
  font-weight:700;cursor:pointer;transition:all .2s;
}
.rbtn:active{background:rgba(0,212,255,.25);transform:scale(.98);}
.rbtn.loading{opacity:.6;pointer-events:none;}
.spin{display:inline-block;animation:sp .7s linear infinite;}
@keyframes sp{to{transform:rotate(360deg);}}

.credit{grid-column:1/-1;text-align:center;font-size:10px;color:rgba(255,255,255,.2);padding-bottom:8px;}
</style>

<div class="app">
  <div class="ocean-bg">
    <svg class="w1" viewBox="0 0 1440 80" fill="none"><path d="M0,40 C180,80 360,0 540,40 C720,80 900,0 1080,40 C1260,80 1440,0 1440,40 L1440,80 L0,80 Z" fill="#00d4ff"/><path d="M0,40 C180,80 360,0 540,40 C720,80 900,0 1080,40 C1260,80 1440,0 1440,40 L1440,80 L0,80 Z" fill="#00d4ff" transform="translate(720,0)"/></svg>
    <svg class="w2" viewBox="0 0 1440 80" fill="none"><path d="M0,50 C200,10 400,70 600,50 C800,30 1000,70 1200,50 C1400,30 1440,45 1440,50 L1440,80 L0,80 Z" fill="#1a6fa8"/><path d="M0,50 C200,10 400,70 600,50 C800,30 1000,70 1200,50 C1400,30 1440,45 1440,50 L1440,80 L0,80 Z" fill="#1a6fa8" transform="translate(720,0)"/></svg>
  </div>

  <div class="page">
    <div class="header">
      <div class="brand">🌊 KUJUKURI</div>
      <div class="upd" id="upd">読み込み中...</div>
    </div>

    <div class="spots-wrap"><div class="spots" id="spots"></div></div>

    <div class="main-grid">

      <!-- ヒーロー -->
      <div class="hero">
        <div class="ring">
          <svg width="88" height="88" viewBox="0 0 88 88">
            <circle cx="44" cy="44" r="38" fill="none" stroke="rgba(255,255,255,.08)" stroke-width="6"/>
            <circle id="arc" cx="44" cy="44" r="38" fill="none" stroke="#00d4ff" stroke-width="6"
              stroke-linecap="round" stroke-dasharray="239" stroke-dashoffset="239"
              transform="rotate(-90 44 44)" style="transition:stroke-dashoffset 1s ease,stroke .5s;"/>
          </svg>
          <div class="rnum"><div class="rval" id="rval">--</div><div class="rlbl">SCORE</div></div>
        </div>
        <div class="hinfo">
          <div class="hspot" id="hspot">--</div>
          <div class="hcond cf" id="hcond">読み込み中</div>
          <div class="hbt" id="hbt">ベストタイム: <strong>--</strong></div>
        </div>
      </div>

      <!-- 数値カード -->
      <div class="sgrid">
        <div class="sc"><div class="si">🌊</div><div class="sl">波高</div><div class="sv" id="sv-h">--</div><div class="su">m</div><div id="src-h" class="src-badge"></div></div>
        <div class="sc"><div class="si">⏱</div><div class="sl">周期</div><div class="sv" id="sv-p">--</div><div class="su">秒</div><div id="src-p" class="src-badge"></div></div>
        <div class="sc"><div class="si">💨</div><div class="sl">風速・風向</div><div class="sv" id="sv-w">--</div><div class="su" id="sv-wd">km/h</div></div>
        <div class="sc"><div class="si">🌡</div><div class="sl">気温</div><div class="sv" id="sv-t">--</div><div class="su">℃</div></div>
      </div>

      <!-- 波グラフ -->
      <div class="viz" style="grid-column:1/-1;">
        <div class="vtitle">本日の波高推移（24時間）</div>
        <div class="hbars" id="hbars"></div>
        <div class="bands" id="bands"></div>
      </div>

      <!-- ノート -->
      <div class="note" id="src-note"></div>

      <!-- 3日間予報 -->
      <div class="fc-section">
        <div class="fctitle">3日間予報</div>
        <div class="fc-rows" id="fclist"></div>
      </div>

      <!-- お気に入り -->
      <div class="favs">
        <div class="favtitle">⭐ お気に入り</div>
        <div class="favchips" id="favchips"></div>
      </div>

      <!-- 更新ボタン -->
      <div class="rbtn-wrap">
        <button class="rbtn" id="rbtn" onclick="loadData()">最新データを取得 ↻</button>
      </div>

      <div class="credit" id="credit">データ: Open-Meteo（自動更新）</div>
    </div>
  </div>
</div>

<script>
const SPOTS=[
  {name:"片貝新堤", lat:35.5350,lon:140.4680},
  {name:"作田",     lat:35.5200,lon:140.4900},
  {name:"豊海海岸", lat:35.4900,lon:140.5100},
  {name:"白子",     lat:35.4500,lon:140.5200},
  {name:"一松",     lat:35.4100,lon:140.5400},
  {name:"白里",     lat:35.3700,lon:140.5500},
  {name:"中里",     lat:35.4300,lon:140.5300},
  {name:"不動堂",   lat:35.5000,lon:140.5000},
  {name:"蓮沼",     lat:35.5600,lon:140.4500},
  {name:"片貝漁港", lat:35.5450,lon:140.4600},
];
let cur=0;
const favs=new Set();

const spotsEl=document.getElementById('spots');
SPOTS.forEach((s,i)=>{
  const b=document.createElement('button');
  b.className='stab'+(i===0?' active':'');
  b.textContent=s.name;
  b.onclick=()=>{cur=i;document.querySelectorAll('.stab').forEach((x,j)=>x.classList.toggle('active',j===i));loadData();};
  spotsEl.appendChild(b);
});

const favcEl=document.getElementById('favchips');
SPOTS.forEach((s,i)=>{
  const c=document.createElement('div');
  c.className='fchip';c.textContent=s.name;
  c.onclick=()=>{if(favs.has(i)){favs.delete(i);c.classList.remove('on');}else{favs.add(i);c.classList.add('on');}};
  favcEl.appendChild(c);
});

function windDir(d){const a=["北","北北東","北東","東北東","東","東南東","南東","南南東","南","南南西","南西","西南西","西","西北西","北西","北北西"];return a[Math.round(d/22.5)%16];}

function estimateWave(w,h){
  const base=w<10?0.3:w<20?0.4+(w-10)*0.03:w<30?0.7+(w-20)*0.05:w<40?1.2+(w-30)*0.07:Math.min(3.5,1.9+(w-40)*0.05);
  const tc=(h>=6&&h<=9)?0.85:(h>=14&&h<=18)?1.1:1.0;
  return Math.round(base*tc*10)/10;
}
function estimatePeriod(h){return Math.round(4.4*Math.sqrt(Math.max(0.1,h)));}
function surfScore(h,p,ws){
  let s=0;
  if(h>=0.5&&h<=2.0)s+=40;else if(h>2.0&&h<=3.0)s+=25;else if(h>0.3)s+=15;
  if(p>=8&&p<=14)s+=30;else if(p>=6)s+=18;else if(p>=4)s+=8;
  if(ws<15)s+=30;else if(ws<25)s+=20;else if(ws<35)s+=10;
  return Math.min(100,Math.round(s));
}
function condOf(sc){return sc>=70?{t:"グッド 🤙",c:"cg"}:sc>=40?{t:"まずまず",c:"cf"}:{t:"物足りない",c:"cp"};}
function dotOf(sc){return sc>=70?"dg":sc>=40?"df":"dp";}
function setArc(sc){
  const o=239-(239*sc/100);
  const a=document.getElementById('arc');
  a.style.strokeDashoffset=o;
  a.style.stroke=sc>=70?"#06D6A0":sc>=40?"#FFD166":"#EF476F";
}
function bestTime(heights,winds){
  let bi=-1,bs=-1;
  heights.slice(5,19).forEach((h,i)=>{
    const s=surfScore(h||0,estimatePeriod(h||0),winds[i+5]||15);
    if(s>bs){bs=s;bi=i+5;}
  });
  return bi<0?"--":`${bi}:00〜${bi+2}:00`;
}

async function loadData(){
  const sp=SPOTS[cur];
  const btn=document.getElementById('rbtn');
  btn.classList.add('loading');
  btn.innerHTML='<span class="spin">↻</span> 取得中...';

  let waveH=null,waveP=null,waveHourly=null,waveHmax=null,wavePmax=null,isReal=false;

  try{
    const mr=await fetch(`https://marine-api.open-meteo.com/v1/marine?latitude=${sp.lat}&longitude=${sp.lon}&hourly=wave_height,wave_period&daily=wave_height_max,wave_period_max&timezone=Asia%2FTokyo&forecast_days=3`,{signal:AbortSignal.timeout(6000)});
    const md=await mr.json();
    if(!md.error&&md.hourly?.wave_height){
      const hi=new Date().getHours();
      waveH=md.hourly.wave_height[hi];
      waveP=md.hourly.wave_period[hi];
      waveHourly=md.hourly.wave_height;
      waveHmax=md.daily?.wave_height_max;
      wavePmax=md.daily?.wave_period_max;
      if(waveH!=null)isReal=true;
    }
  }catch(e){}

  let windH=[],windD=[],tempH=[],windHmax=[];
  try{
    const wr=await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${sp.lat}&longitude=${sp.lon}&hourly=wind_speed_10m,wind_direction_10m,temperature_2m&daily=wind_speed_10m_max&timezone=Asia%2FTokyo&forecast_days=3`,{signal:AbortSignal.timeout(6000)});
    const wd=await wr.json();
    windH=wd.hourly?.wind_speed_10m||[];
    windD=wd.hourly?.wind_direction_10m||[];
    tempH=wd.hourly?.temperature_2m||[];
    windHmax=wd.daily?.wind_speed_10m_max||[];
  }catch(e){}

  const hi=new Date().getHours();
  const ws=windH[hi]??15;
  const wdeg=windD[hi]??null;
  const tmp=tempH[hi]??null;

  if(waveH==null){
    waveH=estimateWave(ws,hi);
    waveP=estimatePeriod(waveH);
    waveHourly=windH.slice(0,24).map((w,i)=>estimateWave(w||15,i));
    waveHmax=windHmax.length>0?windHmax.map(w=>estimateWave(w||15,12)):[waveH,waveH*0.9,waveH*1.1];
    wavePmax=waveHmax.map(h=>estimatePeriod(h));
  }

  const sc=surfScore(waveH,waveP,ws);
  const cond=condOf(sc);
  document.getElementById('rval').textContent=sc;
  document.getElementById('hspot').textContent=sp.name;
  const hc=document.getElementById('hcond');hc.textContent=cond.t;hc.className=`hcond ${cond.c}`;
  setArc(sc);
  document.getElementById('hbt').innerHTML=`ベストタイム: <strong>${bestTime(waveHourly,windH)}</strong>`;

  document.getElementById('sv-h').textContent=waveH.toFixed(1);
  document.getElementById('sv-p').textContent=Math.round(waveP);
  document.getElementById('sv-w').textContent=Math.round(ws);
  document.getElementById('sv-wd').textContent=wdeg!=null?windDir(wdeg):'km/h';
  document.getElementById('sv-t').textContent=tmp!=null?tmp.toFixed(1):'--';

  const sh=document.getElementById('src-h'),sp2=document.getElementById('src-p');
  sh.className='src-badge '+(isReal?'src-real':'src-est');sh.textContent=isReal?'実測値':'推定値';
  sp2.className='src-badge '+(isReal?'src-real':'src-est');sp2.textContent=isReal?'実測値':'推定値';
  document.getElementById('src-note').textContent=isReal
    ?'✅ 波高・周期は海洋気象データの実測値です。'
    :'⚡ 波高・周期は風速・風向・時刻から推定した値です。実際と多少異なる場合があります。';

  renderBars(waveHourly.slice(0,24),windH,hi);
  renderForecast(waveHmax,wavePmax,windHmax);

  const now=new Date();
  document.getElementById('upd').textContent=`${now.getMonth()+1}/${now.getDate()} ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')} 更新`;
  document.getElementById('credit').textContent=isReal?'データ: Open-Meteo Marine API（実測・無料）':'データ: Open-Meteo Weather API + 独自推定式';

  btn.classList.remove('loading');btn.textContent='最新データを取得 ↻';
}

function renderBars(heights,winds,nowIdx){
  const el=document.getElementById('hbars'),be=document.getElementById('bands');
  el.innerHTML='';be.innerHTML='';
  const max=Math.max(...heights.map(h=>Number(h)||0),0.1);
  heights.forEach((h,i)=>{
    const hv=Number(h)||0;
    const w=document.createElement('div');w.className='hbw';
    const b=document.createElement('div');b.className='hb'+(i===nowIdx?' now':'');
    b.style.height=Math.round((hv/max)*56+2)+'px';
    const l=document.createElement('div');l.className='hbl';l.textContent=i%6===0?i+'h':'';
    w.appendChild(b);w.appendChild(l);el.appendChild(w);
    const bd=document.createElement('div');
    const sc=surfScore(hv,estimatePeriod(hv),winds[i]||15);
    bd.className='band '+(sc>=70?'bg2':sc>=40?'bf2':'bp2');
    be.appendChild(bd);
  });
}

function renderForecast(hmax,pmax,wmax){
  const el=document.getElementById('fclist');el.innerHTML='';
  const days=['今日','明日','明後日'];
  (hmax||[]).slice(0,3).forEach((h,i)=>{
    const hv=Number(h)||0;
    const p=Number(pmax?.[i])||estimatePeriod(hv);
    const ws=Number(wmax?.[i])||15;
    const sc=surfScore(hv,p,ws);
    const row=document.createElement('div');row.className='fcrow';
    row.innerHTML=`<span class="fcd">${days[i]}</span><span class="fcdot ${dotOf(sc)}"></span><span class="fch">${hv.toFixed(1)} m</span><span class="fcp">周期 ${Math.round(p)}秒</span><span class="fcs">${sc}pt</span>`;
    el.appendChild(row);
  });
}

loadData();
setInterval(loadData,30*60*1000);
</script>
